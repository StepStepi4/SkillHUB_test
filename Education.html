<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Навчання - SkillHUB</title>
    <meta name="theme-color" content="#f2f2f7">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f2f2f7; 
            --card-bg: #ffffff;
            --text-main: #111827; 
            --text-muted: #6b7280; 
            --primary: #10b981; 
            --primary-light: #d1fae5;
            --border: #e5e7eb;
            --input-bg: #f9fafb;
            --danger: #ef4444;
            --success: #10b981;
            
            --rozetka-green-light: #00c65d;
            --rozetka-green-dark: #00a046;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; -webkit-font-smoothing: antialiased; 
        }

        .container { 
            width: 100%; max-width: 480px; 
            padding: 24px 16px; margin: 0 auto;
            position: relative;
        }

        /* АНИМАЦИИ ЭКРАНОВ */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ЛОАДЕР */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ТИПОГРАФИКА */
        h1 { font-size: 26px; font-weight: 800; margin: 0 0 8px 0; text-align: center; letter-spacing: -0.5px;}
        p.subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 24px; font-weight: 500;}
        .big-emoji { text-align: center; font-size: 64px; margin-bottom: 16px; line-height: 1; }

        /* ВВОД И ФОРМЫ */
        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;}
        input { 
            width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 500;
            background: var(--input-bg); border: 1px solid var(--border); outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        /* КНОПКИ */
        .btn {
            width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700;
            cursor: pointer; border: none; transition: 0.2s; text-align: center; display: flex; justify-content: center; align-items: center; gap: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-glow {
            background: linear-gradient(135deg, var(--rozetka-green-light) 0%, var(--rozetka-green-dark) 100%);
            color: white; box-shadow: 0 8px 20px rgba(0, 198, 93, 0.3);
        }
        .btn-glow:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(0, 198, 93, 0.2); }
        .btn-secondary { background: var(--border); color: var(--text-main); margin-bottom: 12px;}
        .btn-secondary:active { background: #d1d5db; }

        /* СПИСКИ (КУРСЫ / ПРОДУКТЫ) */
        .list-card {
            background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 12px; padding: 16px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .list-card:active { transform: scale(0.98); background: var(--input-bg); }
        .list-card-title { font-size: 16px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 12px;}
        .list-card-icon { font-size: 24px; }
        .list-card-arrow { color: var(--text-muted); font-weight: bold; }

        /* ТЕОРИЯ (ОПИСАНИЕ) */
        .theory-box { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
        .theory-line { padding: 16px; font-size: 15px; line-height: 1.6; color: var(--text-main); font-weight: 500; border-bottom: 1px solid var(--border); }
        .theory-line:last-child { border-bottom: none; }
        
        /* ТЕСТЫ */
        .question-card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .question-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; line-height: 1.4; color: var(--text-main); }
        
        .answer-label {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px;
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 15px;
        }
        .answer-label:hover { border-color: var(--primary); }
        .answer-label input { width: 20px; height: 20px; margin: 0; cursor: pointer; flex-shrink: 0; accent-color: var(--primary); }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 24px; gap: 12px; }
        .back-btn { background: transparent; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border); transition: 0.2s;}
        .back-btn:active { background: var(--input-bg); transform: scale(0.9); }
        
        #errorMsg { color: var(--danger); font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 16px; display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px;}
    </style>
</head>
<body>

<div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <div style="font-weight: 600; color: var(--text-muted);">Завантаження модуля...</div>
</div>

<div class="container">

    <div id="loginView" class="view">
        <div class="big-emoji">🧑‍🎓</div>
        <h1>Вхід у Навчання</h1>
        <p class="subtitle">Увійдіть, щоб розпочати вивчення матеріалів</p>
        
        <div id="errorMsg">Невірний логін або пароль!</div>

        <div class="input-group">
            <span class="input-label">Логін</span>
            <input type="text" id="loginInput" placeholder="Введіть ваш логін" autocapitalize="off">
        </div>
        <div class="input-group" style="margin-bottom: 24px;">
            <span class="input-label">Пароль</span>
            <input type="password" id="passInput" placeholder="Введіть пароль">
        </div>

        <button class="btn btn-glow" onclick="handleLogin()">УВІЙТИ</button>
        <button class="btn btn-secondary" style="margin-top: 12px;" onclick="window.location.href='index.html'">Повернутися назад</button>
    </div>

    <div id="courseView" class="view">
        <div class="nav-header" style="justify-content: space-between;">
            <div>
                <h2 style="margin:0; font-size: 22px; font-weight: 800;">Ваші курси</h2>
                <div style="font-size: 13px; color: var(--text-muted); font-weight: 600;" id="userWelcome"></div>
            </div>
            <button class="back-btn" onclick="logout()" title="Вийти">🚪</button>
        </div>
        <div id="courseList"></div>
    </div>

    <div id="productView" class="view">
        <div class="nav-header">
            <button class="back-btn" onclick="switchView('courseView')">❮</button>
            <h2 id="productViewTitle" style="margin:0; font-size: 18px; font-weight: 700; line-height: 1.2;"></h2>
        </div>
        <p class="subtitle" style="text-align: left; margin-top: -10px;">Оберіть продукт для вивчення:</p>
        <div id="productList"></div>
    </div>

    <div id="theoryView" class="view">
        <div class="nav-header">
            <button class="back-btn" onclick="switchView('productView')">❮</button>
            <h2 id="theoryTitle" style="margin:0; font-size: 18px; font-weight: 700;"></h2>
        </div>
        
        <div class="big-emoji" id="theoryEmoji">💡</div>
        
        <div id="theoryContent" class="theory-box"></div>
        
        <button class="btn btn-glow" onclick="startTest()">ПРОЙТИ ТЕСТ</button>
    </div>

    <div id="testView" class="view">
        <div class="nav-header">
            <button class="back-btn" onclick="switchView('theoryView')">❮</button>
            <h2 style="margin:0; font-size: 18px; font-weight: 700;">Тестування</h2>
        </div>
        
        <div id="testContainer"></div>
        
        <button class="btn btn-glow" id="submitTestBtn" onclick="submitTest()">ЗАВЕРШИТИ ТЕСТ</button>
    </div>

    <div id="resultView" class="view">
        <div class="big-emoji" id="resultEmoji">🏆</div>
        <h1 id="resultTitle">Результат</h1>
        <p class="subtitle" id="resultSubtitle" style="font-size: 16px; margin-bottom: 30px;"></p>
        
        <div id="resultActionContainer"></div>
    </div>

</div>

<script>
    // URL твоего развернутого скрипта
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZRysYyAsBLnrIEJQJ6hllIJ1XbZcP_DYLKPi33FnazPAXb40NJRut_oE-SEjq6LCtLw/exec';
    
    let db = null;
    let currentUser = null;
    let coursesMap = {}; // Сгруппированные курсы
    let currentCourseName = "";
    let currentProductData = null;
    let parsedQuestions = [];

    // Инициализация при загрузке
    window.onload = async () => {
        try {
            const response = await fetch(API_URL + '?nocache=' + Date.now());
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);
            db = data.educationData; // Используем блок educationData из скрипта
            
            if (!db || !db.users || !db.courses) {
                throw new Error("Дані навчання не знайдені в таблиці.");
            }

            // Группируем продукты по курсам
            db.courses.forEach(c => {
                if (!coursesMap[c.course]) coursesMap[c.course] = [];
                coursesMap[c.course].push(c);
            });

            document.getElementById('loader').style.display = 'none';
            switchView('loginView');

        } catch (e) {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('#loader div:nth-child(2)').innerHTML = `<span style="color: var(--danger)">Помилка завантаження: ${e.message}</span>`;
        }
    };

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    function handleLogin() {
        const l = document.getElementById('loginInput').value.trim();
        const p = document.getElementById('passInput').value.trim();
        const err = document.getElementById('errorMsg');

        if (!l || !p) { err.innerText = "Введіть логін та пароль"; err.style.display = 'block'; return; }

        const user = db.users.find(u => u.login === l && u.pass === p);
        if (user) {
            currentUser = user.login;
            err.style.display = 'none';
            document.getElementById('userWelcome').innerText = `Користувач: ${currentUser}`;
            renderCourses();
            switchView('courseView');
        } else {
            err.innerText = "Невірний логін або пароль!";
            err.style.display = 'block';
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginInput').value = '';
        document.getElementById('passInput').value = '';
        switchView('loginView');
    }

    // Отрисовка курсов
    function renderCourses() {
        const list = document.getElementById('courseList');
        const courseNames = Object.keys(coursesMap);
        
        if (courseNames.length === 0) {
            list.innerHTML = '<div style="text-align:center; color: var(--text-muted); padding: 20px;">Курси відсутні</div>';
            return;
        }

        list.innerHTML = courseNames.map(name => `
            <div class="list-card" onclick="openCourse('${name}')">
                <div class="list-card-title">
                    <div class="list-card-icon">📘</div>
                    <span>${name}</span>
                </div>
                <div class="list-card-arrow">❯</div>
            </div>
        `).join('');
    }

    function openCourse(name) {
        currentCourseName = name;
        document.getElementById('productViewTitle').innerText = name;
        
        const list = document.getElementById('productList');
        const products = coursesMap[name];

        list.innerHTML = products.map((p, index) => `
            <div class="list-card" onclick="openProduct(${index})">
                <div class="list-card-title">
                    <div class="list-card-icon">📄</div>
                    <span>${p.product}</span>
                </div>
                <div class="list-card-arrow">❯</div>
            </div>
        `).join('');

        switchView('productView');
    }

    function openProduct(index) {
        currentProductData = coursesMap[currentCourseName][index];
        document.getElementById('theoryTitle').innerText = currentProductData.product;
        
        // Красивое форматирование теории с линиями
        const contentBox = document.getElementById('theoryContent');
        const rawInfo = currentProductData.info || "Опис відсутній...";
        
        // Разбиваем на строки и оборачиваем каждую в theory-line
        const formattedHTML = rawInfo.split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)
            .map(line => `<div class="theory-line">${line}</div>`)
            .join('');

        contentBox.innerHTML = formattedHTML;

        // Рандомный емодзи для красоты
        const emojis = ['🎓', '💡', '🚀', '🧠', '📘'];
        document.getElementById('theoryEmoji').innerText = emojis[Math.floor(Math.random() * emojis.length)];

        switchView('theoryView');
    }

    // ПАРСЕР ТЕСТОВ (Понимает нумерацию 1. 2. и ответы 1/a) (+))
    function parseTestString(testStr) {
        let lines = testStr.split('\n').map(l => l.trim()).filter(l => l);
        let questions = [];
        let currentQ = null;

        lines.forEach(line => {
            // Проверяем, вопрос ли это (начинается с цифры и точки)
            let qMatch = line.match(/^(\d+)\.\s*(.*)/);
            if (qMatch) {
                if (currentQ) questions.push(currentQ);
                currentQ = { text: qMatch[2], answers: [], type: 'radio' };
            } else {
                // Проверяем, ответ ли это (начинается с цифры, слеша, буквы и скобки)
                let aMatch = line.match(/^\d+\/[a-zа-яA-ZА-Я0-9]\)\s*(.*)/);
                if (aMatch && currentQ) {
                    let ansText = aMatch[1];
                    let isCorrect = false;
                    
                    // Проверяем наличие (+)
                    if (ansText.includes('(+)')) {
                        isCorrect = true;
                        ansText = ansText.replace(/\(\+\)/g, '').trim();
                    }
                    currentQ.answers.push({ text: ansText, correct: isCorrect });
                }
            }
        });
        if (currentQ) questions.push(currentQ);

        // Определяем тип (radio или checkbox) на основе количества правильных ответов
        questions.forEach(q => {
            let correctCount = q.answers.filter(a => a.correct).length;
            if (correctCount > 1) q.type = 'checkbox';
        });

        return questions;
    }

    function startTest() {
        if (!currentProductData.test || currentProductData.test.trim() === "") {
            alert("Тест для цього продукту відсутній.");
            return;
        }

        parsedQuestions = parseTestString(currentProductData.test);
        
        if (parsedQuestions.length === 0) {
            alert("Помилка обробки тесту. Перевірте формат у таблиці.");
            return;
        }

        const container = document.getElementById('testContainer');
        container.innerHTML = parsedQuestions.map((q, qIndex) => {
            
            let answersHtml = q.answers.map((ans, aIndex) => `
                <label class="answer-label">
                    <input type="${q.type}" name="q_${qIndex}" id="q${qIndex}_a${aIndex}">
                    <span>${ans.text}</span>
                </label>
            `).join('');

            let hint = q.type === 'checkbox' ? `<span style="font-size:12px; font-weight:normal; color:var(--text-muted); display:block; margin-top:4px;">(Множинний вибір)</span>` : '';

            return `
                <div class="question-card">
                    <div class="question-title">${qIndex + 1}. ${q.text} ${hint}</div>
                    ${answersHtml}
                </div>
            `;
        }).join('');

        switchView('testView');
    }

    async function submitTest() {
        let correctCount = 0;

        // Подсчет результатов
        parsedQuestions.forEach((q, qIndex) => {
            let isQuestionCorrect = true;
            let answeredAnything = false;

            q.answers.forEach((ans, aIndex) => {
                let isChecked = document.getElementById(`q${qIndex}_a${aIndex}`).checked;
                if (isChecked) answeredAnything = true;
                
                // Если чекбокс отмечен неверно (выбрал неправильный или не выбрал правильный)
                if (isChecked !== ans.correct) {
                    isQuestionCorrect = false;
                }
            });

            // Вопрос засчитывается, только если все галочки стоят идеально правильно
            if (isQuestionCorrect && answeredAnything) {
                correctCount++;
            }
        });

        let totalScore = Math.round((correctCount / parsedQuestions.length) * 100);
        let passed = totalScore >= 80; // Проходной балл 80%

        // Настройка экрана результата
        document.getElementById('resultEmoji').innerText = passed ? '🎉' : '💔';
        document.getElementById('resultTitle').innerText = passed ? 'Тест складено!' : 'Тест не складено';
        document.getElementById('resultTitle').style.color = passed ? 'var(--success)' : 'var(--danger)';
        document.getElementById('resultSubtitle').innerHTML = `Твій результат: <strong style="font-size:20px; color: var(--text-main);">${totalScore}%</strong><br><span style="font-size:13px;">(${correctCount} з ${parsedQuestions.length} правильних)</span>`;

        let actionHtml = '';
        if (passed) {
            actionHtml = `<button class="btn btn-glow" onclick="switchView('productView')">ПЕРЕЙТИ ДАЛІ</button>`;
        } else {
            actionHtml = `
                <button class="btn btn-glow" style="margin-bottom: 12px;" onclick="startTest()">СПРОБУВАТИ ЩЕ РАЗ</button>
                <button class="btn btn-secondary" onclick="switchView('theoryView')">ПОВТОРИТИ ТЕОРІЮ</button>
            `;
        }
        document.getElementById('resultActionContainer').innerHTML = actionHtml;

        // Отправка в Google Таблицу (показываем лоадер во время отправки)
        document.getElementById('loader').style.display = 'flex';
        document.querySelector('#loader div:nth-child(2)').innerText = "Збереження результату...";

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    login: currentUser,
                    product: currentProductData.product, // Название колонки
                    score: totalScore
                })
            });
        } catch (e) {
            console.error("Помилка відправки:", e);
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.querySelector('#loader div:nth-child(2)').innerText = "Завантаження модуля...";
            switchView('resultView');
        }
    }

</script>
</body>
</html>
