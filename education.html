<script>
    // URL твоего опубликованного веб-приложения (из деплоя Google Apps Script)
    const WEB_APP_URL = 'URL_ВАШЕГО_WEB_APP'; 

    async function loadDropdown() {
        const select = document.getElementById('brandSelect');
        
        try {
            // Запрос данных из твоего скрипта
            const response = await fetch('https://script.google.com/macros/s/AKfycbwKXTYY0WP1-4NrwKFITgrhM8frHpgNTg4X_9gOyfIKdex0OatvOqLM855wOU5xVyvp3Q/execL');
            const data = await response.json();
            
            // Проверяем, есть ли данные
            if (data && data.trainingData) {
                // Очищаем текущие опции (кроме первой "Оберіть продукт")
                select.innerHTML = '<option value="">-- Оберіть продукт --</option>';
                
                // Добавляем новые опции из колонки E (названия сервісів)
                data.trainingData.forEach(item => {
                    if (item.name) {
                        const option = document.createElement('option');
                        option.value = item.name;
                        option.textContent = item.name;
                        select.appendChild(option);
                    }
                });
            }
        } catch (error) {
            console.error('Помилка завантаження даних:', error);
            select.innerHTML = '<option value="">Помилка завантаження</option>';
        }
    }

    // Запускаем загрузку при открытии страницы
    window.onload = loadDropdown;
</script>
