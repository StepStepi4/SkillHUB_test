<script>
    // URL исправлен: убрали лишнюю 'L' в конце
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwKXTYY0WP1-4NrwKFITgrhM8frHpgNTg4X_9gOyfIKdex0OatvOqLM855wOU5xVyvp3Q/exec';

    async function loadDropdown() {
        const select = document.getElementById('brandSelect');
        
        try {
            // Используем переменную WEB_APP_URL для удобства
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            // Проверяем, есть ли данные
            if (data && data.trainingData) {
                // Очищаем текущие опции
                select.innerHTML = '<option value="">-- Оберіть продукт --</option>';
                
                // Заполняем выпадающий список
                data.trainingData.forEach(item => {
                    if (item.name) {
                        const option = document.createElement('option');
                        option.value = item.name;
                        option.textContent = item.name;
                        select.appendChild(option);
                    }
                });
            }
        } catch (error) {
            console.error('Помилка завантаження даних:', error);
            select.innerHTML = '<option value="">Помилка завантаження</option>';
        }
    }

    // Запускаем функцию при загрузке
    window.onload = loadDropdown;
</script>
