<script>
    // --- ОСНОВНІ НАЛАШТУВАННЯ ТА ЗМІННІ ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbzBs_FfOIRtcP_m7gvioqIQ29w0LMBmGeQ49WajRbSQgVhwjS6PL3qPMpigxmE8sFz9QQ/exec';
    const CACHE_KEY = 'skillhub_v22_stable'; 
    const SEEN_VERSION_KEY = 'skillhub_seen_version';
    
    let db = { categories: [], descriptions: {}, tariffs: [], appVersion: "", changelog: "", montazhData: [], serviceCodes: {}, rezervyData: [] };
    let currentCategoryData = null;
    let scrollPos = 0;
    
    let isCompareMode = false;
    let compareSelection = [];
    window.lastCalculatedServices = [];

    let isModalCompareMode = false;
    let modalCompareSelection = [];
    window.lastModalServices = [];

    // --- БЕЗПЕЧНЕ ЕКРАНУВАННЯ (FIX ЗАВИСАННЯ) ---
    window.escapeHTML = function(s) { 
        if(!s) return ''; 
        return s.toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); 
    }
    window.escapeForJS = function(s) { 
        if(!s) return ''; 
        return s.toString().replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,"\\n").replace(/\r/g,""); 
    }

    // --- ТЕМА ТА БЛОКУВАННЯ СКРОЛУ ---
    let currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);

    document.getElementById('themeToggle').onclick = () => {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
    };

    function toggleBodyScroll(disable) {
        if(disable) { 
            scrollPos = window.pageYOffset; 
            document.body.classList.add('modal-open'); 
            document.body.style.top = `-${scrollPos}px`; 
        } else { 
            document.body.classList.remove('modal-open'); 
            document.body.style.top = ''; 
            window.scrollTo(0, scrollPos); 
        }
    }

    // --- НАВІГАЦІЯ ---
    window.switchTab = function(pageId, element) {
        document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (element) { element.classList.add('active'); }
        window.scrollTo(0, 0);
    }

    const brandRegex = /^\[(.*?)\]/;
    const emojiRegex = /^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])/;
    const normalize = (str) => str ? str.toString().toLowerCase().trim().replace(/[‘’'"`]/g, "") : "";
    function normalizeServiceName(s) { return s ? s.replace(/^\[.*?\]\s*/, '').replace(/[«»"'”`\u00A0\s]/g, '').trim().toLowerCase() : ""; }

    function findInDb(dict, key) {
        if (!key) return "";
        if (dict[key]) return dict[key];
        let clean = normalizeServiceName(key);
        for (let k in dict) { if (normalizeServiceName(k) === clean) return dict[k]; }
        return "";
    }

    function debounce(func, wait) {
        let timeout;
        return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); };
    }

    window.copyCode = function(e, el, code) {
        if (e) e.stopPropagation(); 
        const fallbackCopy = () => {
            let ta = document.createElement("textarea"); ta.value = code; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.focus(); ta.select();
            try { document.execCommand('copy'); window.showCopied(el, code); } catch (err) {}
            ta.remove();
        };
        if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(code).then(() => window.showCopied(el, code)).catch(() => fallbackCopy());
        else fallbackCopy();
    }

    window.showCopied = function(el, code) {
        const valueBox = el.querySelector('.code-value-text');
        if(!valueBox) return; 
        const originalHTML = valueBox.innerHTML;
        valueBox.innerHTML = "✅ Скопійовано!";
        setTimeout(() => { valueBox.innerHTML = originalHTML; }, 1500);
    }

    function setAppStatus(state, text) {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        if(!dot || !txt) return;
        dot.className = 'pulse-dot'; 
        if (state === 'ok') dot.classList.add('dot-green');
        else if (state === 'error') dot.classList.add('dot-red');
        else dot.classList.add('dot-loading');
        txt.innerText = text;
    }

    // --- ІНІЦІАЛІЗАЦІЯ ---
    async function init() {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) { 
            try {
                db = JSON.parse(cached); 
                enableUI(); window.populateStoreFilter(); window.buildTrainingCatalog(); window.renderRezervyList();
                setAppStatus('ok', 'Офлайн');
                refreshData(); 
            } catch(e) { await refreshData(true); }
        } else { await refreshData(true); }
    }

    async function refreshData(first = false) {
        setAppStatus('loading', 'Синхронізація...');
        try {
            const response = await fetch(API_URL + '?nocache=' + Date.now());
            if (!response.ok) throw new Error("HTTP_ERROR");
            const dataStr = await response.text();
            
            if (dataStr.trim().startsWith('<')) throw new Error("CORS_AUTH");
            
            let newDb;
            try { newDb = JSON.parse(dataStr); } catch(e) { throw new Error("JSON_PARSE"); }
            if (newDb.error) throw new Error(newDb.error);
            
            db = newDb;
            localStorage.setItem(CACHE_KEY, dataStr);
            setAppStatus('ok', 'Дані актуальні');
            
            enableUI(); window.populateStoreFilter(); window.buildTrainingCatalog(); window.renderRezervyList();
        } catch (e) { 
            console.error(e);
            if (localStorage.getItem(CACHE_KEY)) {
                setAppStatus('ok', 'Офлайн (З кешу)');
                if (first) { enableUI(); window.populateStoreFilter(); window.buildTrainingCatalog(); window.renderRezervyList(); }
            } else { 
                setAppStatus('error', 'Помилка');
                if (first && document.getElementById('appLoader')) {
                    let errMsg = "❌ Помилка завантаження бази даних.";
                    if (e.message === "CORS_AUTH") {
                        errMsg = `<div style="color:#ef4444; font-size:18px; margin-bottom:10px;">❌ Помилка доступу до бази</div>
                                  <div style="font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:20px; line-height:1.5;">
                                  Ви забули дати доступ до Google Script!<br>В налаштуваннях розгортання оберіть:<br>
                                  <i>Від чийого імені: Від мого (Me)</i><br>
                                  <i>У кого є доступ: Усі (Anyone)</i>
                                  </div>
                                  <button onclick="location.reload()" style="background:var(--primary); color:#fff; border:none; padding:12px 24px; border-radius:12px; font-weight:bold; cursor:pointer;">Оновити сторінку</button>`;
                    }
                    document.getElementById('loaderText').innerHTML = errMsg;
                    document.querySelector('.spinner-ring').style.display = 'none';
                }
            }
        }
    }

    document.getElementById('forceUpdateBtn').addEventListener('click', async function() {
        this.classList.add('spinning'); await refreshData(false);
        setTimeout(() => { this.classList.remove('spinning'); }, 500);
    });

    function enableUI() { 
        document.getElementById('catInput').disabled = false; 
        if (document.getElementById('appLoader')) document.getElementById('appLoader').classList.add('hidden');
    }

    // --- МАГАЗИНИ ТА РЕЗЕРВИ ---
    window.saveSettingsStore = function() {
        let val = document.getElementById('settingsStoreSelect').value;
        localStorage.setItem('defaultStore', val);
        document.getElementById('storeFilter').value = val;
        window.renderRezervyList();
    }

    window.saveDefaultStore = function() {
        let val = document.getElementById('storeFilter').value;
        localStorage.setItem('defaultStore', val);
        document.getElementById('settingsStoreSelect').value = val;
    }

    window.populateStoreFilter = function() {
        if (!db.rezervyData || db.rezervyData.length === 0) return;
        const stores = [...new Set(db.rezervyData.map(r => r.store))].sort();
        const s1 = document.getElementById('storeFilter');
        const s2 = document.getElementById('settingsStoreSelect');
        
        s1.innerHTML = '<option value="">-- Всі магазини --</option>'; 
        s2.innerHTML = '<option value="">-- Не обрано --</option>'; 

        stores.forEach(s => {
            if (s && s !== "Не вказано") {
                s1.appendChild(new Option(s, s));
                s2.appendChild(new Option(s, s));
            }
        });

        let def = localStorage.getItem('defaultStore');
        if(def && stores.includes(def)) {
            s1.value = def; s2.value = def;
        }
    }

    window.renderRezervyList = function() {
        const store = document.getElementById('storeFilter').value;
        const container = document.getElementById('rezervyList');
        const clearBtn = document.getElementById('clearStoreBtn');
        if (clearBtn) clearBtn.style.display = store ? 'flex' : 'none';

        if (!store) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted); font-weight:600;">Оберіть магазин, щоб побачити активні резерви</div>';
            return;
        }
        
        let matches = db.rezervyData.filter(r => r.store === store);
        if (matches.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-weight:600;">Немає товарів в цьому магазині</div>`;
            return;
        }

        matches.sort((a, b) => b.price - a.price);

        container.innerHTML = matches.map(r => {
            let shortName = r.name.replace(/^(Телевізор|Ноутбук|Смартфон|Мобільний телефон|Планшет|Холодильник|Пральна машина|Мікрохвильова піч|Кавомашина|Пилосос)\s*/i, '');
            return `
            <div class="rezervy-item" onclick="window.openRezervItemModal('${window.escapeForJS(r.cat)}', ${r.price}, '${window.escapeForJS(shortName)}')">
                <div style="flex: 1; padding-right: 15px; overflow: hidden;">
                    <div class="rezervy-name" title="${window.escapeHTML(r.name)}">${shortName}</div>
                    <div class="rezervy-cat">${window.escapeHTML(r.cat)}</div>
                </div>
                <div class="rezervy-price">${Math.round(r.price).toLocaleString('uk-UA')} ₴</div>
            </div>`;
        }).join('');
    }

    window.openRezervItemModal = function(catName, price, itemName) {
        let searchVal = normalize(catName);
        let foundItem = null;

        if (db.categories && db.categories.length > 0) {
            foundItem = db.categories.find(c => normalize(c.ua).includes(searchVal) || searchVal.includes(normalize(c.ua)));
        }

        if (foundItem) {
            document.getElementById('rezervItemTitle').innerText = itemName + ` — ${Math.round(price).toLocaleString('uk-UA')} ₴`;
            document.getElementById('rezervItemModal').classList.add('show');
            toggleBodyScroll(true);
            let techStr = buildTechInfoHTML(foundItem, price);
            document.getElementById('rezervTechInfo').innerHTML = techStr;
            document.getElementById('rezervTechInfo').style.display = techStr ? 'flex' : 'none';
            
            let listEl = document.getElementById('rezervServiceList');
            if (!foundItem.service) {
                listEl.innerHTML = '<div style="text-align:center; padding: 20px; color:var(--text-muted);">Немає прив\'язаних сервісів</div>';
            } else {
                let dataForSort = calculateServicesArray(foundItem, price);
                listEl.innerHTML = dataForSort.map(s => generateServiceCardHTML(s, true, true)).join('');
            }
        } else { alert(`Увага! Категорію "${catName}" не знайдено в базі сервісів.`); }
    }

    window.closeRezervItemModal = function() {
        document.getElementById('rezervItemModal').classList.remove('show');
        toggleBodyScroll(false);
    }

    // --- КАТАЛОГ НАВЧАННЯ (ТАБ 3) ---
    window.buildTrainingCatalog = function() {
        let groups = { 'SUPPORT': [], 'EKTA': [], 'EPZ': [], 'INSTALL': [], 'SETTINGS': [] };
        let seen = new Set();
        
        if(db.tariffs) {
            db.tariffs.forEach(t => {
                let nClean = normalizeServiceName(t.service);
                if(!seen.has(nClean)) {
                    seen.add(nClean);
                    let u = t.service.toUpperCase();
                    let isStaticEpz = (u.includes('WINDOWS') || u.includes('OFFICE') || u.includes('OFFICE 365') || u.includes('OFFICE 2024') || u.includes('ESD') || u.includes('[ESD]')) && !u.includes('НАЛАШТУВАННЯ') && !u.includes('ВСТАНОВЛЕННЯ') && !u.includes('АНТИВІРУС') && !u.includes('ESET') && !u.includes('PARALLELS');

                    // Обрізаємо періоди (+1, +2) для групування
                    let cleanTitle = t.service.replace(/^\[.*?\]\s*/, '').replace(/\+?\d+\s*(рік|роки|років|міс|місяців|місяці)/i, '').trim();

                    let item = { ...t, cleanTitle: cleanTitle };

                    if (u.includes('SUPPORT') || u.includes('НАШ СЕРВІС')) groups['SUPPORT'].push(item);
                    else if (u.includes('EKTA') || u.includes('ЕКТА')) groups['EKTA'].push(item);
                    else if (u.includes('EPZ') || u.includes('ЕПЗ') || isStaticEpz) groups['EPZ'].push(item);
                    else if (u.includes('МОНТАЖ') || u.includes('ПІДКЛЮЧЕННЯ') || (u.includes('ВСТАНОВЛЕННЯ') && !u.includes('ЗАХИСН'))) groups['INSTALL'].push(item);
                    else groups['SETTINGS'].push(item);
                }
            });
        }

        window.renderGroup('cat-support', groups['SUPPORT']);
        window.renderGroup('cat-ekta', groups['EKTA']);
        window.renderGroup('cat-epz', groups['EPZ']);
        window.renderGroup('cat-install', groups['INSTALL']);
        window.renderGroup('cat-settings', groups['SETTINGS']);
    }

    window.renderGroup = function(containerId, items) {
        // Залишаємо тільки унікальні назви без періодів
        let uniqueItems = [];
        let seenTitles = new Set();
        items.forEach(item => {
            if(!seenTitles.has(item.cleanTitle)) {
                seenTitles.add(item.cleanTitle);
                uniqueItems.push(item);
            }
        });

        uniqueItems.sort((a,b) => a.cleanTitle.localeCompare(b.cleanTitle));
        let html = uniqueItems.map(t => {
            let safeName = window.escapeForJS(t.service);
            let safeCode = window.escapeForJS(t.code || "");
            return `<div class="catalog-item" onclick="window.openModal('${safeName}', '${safeCode}', true)">
                <span>${t.cleanTitle}</span>
                <span style="color:var(--primary); font-weight:900;">></span>
            </div>`;
        }).join('');
        document.getElementById(containerId).innerHTML = html;
    }

    window.toggleCatalog = function(id, btnEl) {
        let el = document.getElementById(id);
        let arrow = btnEl.querySelector('.arrow');
        
        if(el.classList.contains('show')) {
            el.classList.remove('show');
            arrow.innerText = '▼';
        } else {
            document.querySelectorAll('.catalog-items').forEach(e => e.classList.remove('show'));
            document.querySelectorAll('.catalog-header .arrow').forEach(b => b.innerText = '▼');
            el.classList.add('show');
            arrow.innerText = '▲';
        }
    }

    // --- ПОШУК (ТАБ 1) ---
    const elCatInput = document.getElementById('catInput'), elClearBtn = document.getElementById('clearAllBtn');
    const elSuggList = document.getElementById('customSuggestions'), elMatchesCont = document.getElementById('matchesContainer');
    const elPriceInput = document.getElementById('devicePrice');
    
    elCatInput.addEventListener('input', debounce(() => {
        const val = normalize(elCatInput.value); 
        elClearBtn.style.display = val.length > 0 ? 'flex' : 'none';
        
        if (val.length === 0) {
            elSuggList.style.display = "none"; document.getElementById('priceWrapper').style.display = "none"; document.getElementById('result').style.display = "none"; 
            currentCategoryData = null; if(isCompareMode) window.toggleCompareMode(); document.getElementById('toggleCompareBtn').style.display = 'none';
            return;
        }
        
        if (val.length < 2) { elSuggList.style.display = 'none'; return; }
        
        const matches = db.categories.filter(c => normalize(c.ua).includes(val) || normalize(c.ru).includes(val) || normalize(c.en).includes(val)).slice(0, 10);
        
        requestAnimationFrame(() => {
            if (matches.length > 0) {
                elSuggList.style.display = 'block';
                elMatchesCont.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="window.selectItem('${window.escapeForJS(m.ua)}')">${m.ua}</div>`).join('');
            } else { elSuggList.style.display = 'none'; }
        });
    }, 100));

    elClearBtn.onclick = () => { 
        elCatInput.value = ""; elPriceInput.value = ""; elClearBtn.style.display = "none"; elSuggList.style.display = "none"; document.getElementById('priceWrapper').style.display = "none"; document.getElementById('result').style.display = "none"; currentCategoryData = null; elCatInput.focus();
        if(isCompareMode) window.toggleCompareMode(); document.getElementById('toggleCompareBtn').style.display = 'none';
    };
    
    document.getElementById('okBtn').onclick = () => elPriceInput.blur();

    window.selectItem = function(ua) {
        currentCategoryData = db.categories.find(c => c.ua === ua); 
        elCatInput.value = ua; elSuggList.style.display = 'none';
        document.getElementById('uaTitle').innerText = ua; document.getElementById('itemCategory').innerText = currentCategoryData.category || "";
        document.getElementById('priceWrapper').style.display = 'flex'; document.getElementById('result').style.display = 'block';
        if(isCompareMode) window.toggleCompareMode(); 
        renderServices(); 
    }

    function buildTechInfoHTML(item, p) {
        let techHTML = `<div style="font-size: 11px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px;">🛠️ Технічна довідка</div>`;
        let hasInfo = false;

        if (item.complexity) {
            hasInfo = true;
            let s = "color: var(--text-muted); font-weight: 600;"; 
            const t = item.complexity.toLowerCase();
            if (t.includes('критич')) s = "color: #ef4444; font-weight: 900; text-decoration: underline;";
            else if (t.includes('висок')) s = "color: #f59e0b; font-weight: 800;";
            else if (t.includes('середн')) s = "color: #10b981; font-weight: 700;";
            else if (t.includes('низьк')) s = "color: #3b82f6; font-weight: 600;";
            techHTML += `<div class="tech-item"><div class="icon-circle bg-complexity">⚙️</div><div><span style="font-size:9px;color:var(--text-muted);display:block;font-weight:700;text-transform:uppercase;">СКЛАДНІСТЬ</span><span style="font-size:14px; ${s}">${item.complexity}</span></div></div>`;
        }
        
        let calcRepairPrice = item.price ? item.price.toString() : "";
        if (calcRepairPrice.includes('%') && p > 0) {
            let uahCalc = calcRepairPrice.replace(/(\d+(?:\.\d+)?)%/g, (match, p1) => {
                return Math.round(p * parseFloat(p1) / 100).toLocaleString('uk-UA') + " ₴";
            });
            calcRepairPrice = `${calcRepairPrice} <span style="color:var(--primary);">(${uahCalc})</span>`;
        }
        
        const fields = [
            ['💵', 'ВАРТІСТЬ ПЛАТНОГО РЕМОНТУ', calcRepairPrice, 'bg-price'], 
            ['🔧', 'НАЙДОРОЖЧІ ЗАПЧАСТИНИ', item.expensiveParts, 'bg-parts'],
            ['✅', 'ГАРАНТІЙНІ ПОЛОМКИ', item.garant, 'bg-garant'], 
            ['❌', 'НЕГАРАНТІЙНІ ПОЛОМКИ', item.negarant, 'bg-negarant']
        ];
        
        fields.forEach(f => {
            if (f[2] && f[2].toString().trim() !== "") { 
                hasInfo = true;
                let cls = f[1].includes('НЕГАРАНТ') ? 'bg-negarant' : '';
                techHTML += `<div class="tech-item ${cls}"><div class="icon-circle ${f[3]}">${f[0]}</div><div><span style="font-size:9px;color:var(--text-muted);display:block;font-weight:800;text-transform:uppercase;">${f[1]}</span><span style="font-size:13px;font-weight:700;color:var(--text-main);">${f[2]}</span></div></div>`;
            }
        });

        return hasInfo ? techHTML : "";
    }

    function renderTechInfo() {
        if (!currentCategoryData) return;
        const p = parseFloat(elPriceInput.value) || 0;
        let html = buildTechInfoHTML(currentCategoryData, p);
        document.getElementById('techInfo').innerHTML = html;
        document.getElementById('techInfo').style.display = html ? 'flex' : 'none';
    }

    function parseDescriptionLines(descE) {
        if (!descE) return `<div style="text-align:center; padding: 20px; color:var(--text-muted); font-size:13px;">Опис відсутній...</div>`;
        let raw = descE.toString().trim();
        if (raw === "Опис відсутній..." || raw === "") return `<div style="text-align:center; padding: 20px; color:var(--text-muted); font-size:13px;">Опис відсутній...</div>`;

        let html = '';
        let lines = raw.replace(/\|/g, '\n').split(/\r?\n/);
        
        lines.forEach(line => {
            const l = line.trim(); 
            if (!l) return;
            if (l.startsWith('+')) { html += `<div class="modal-section-title">${l.substring(1).trim()}</div>`; return; }
            if (l.startsWith('=')) { html += `<div class="modal-cost-header">${l.substring(1).trim() || 'Вартість:'}</div>`; return; }
            if (l.includes('---')) { html += `<div class="modal-divider"></div>`; return; }
            
            let match = l.match(emojiRegex); 
            let e = match ? match[0] : "";
            let t = match ? l.replace(e, '').trim() : l;
            
            if (!e) {
                let lower = t.toLowerCase();
                if (lower.includes('налаштуван') || lower.includes('встановлен') || lower.includes('пк') || lower.includes('gold') || lower.includes('silver')) e = '⚙️';
                else if (lower.includes('антивірус') || lower.includes('захист') || lower.includes('eset')) e = '🛡️';
                else if (lower.includes('windows') || lower.includes('office') || lower.includes('офіс') || lower.includes('ключ')) e = '🔑';
                else if (lower.includes('гарантія') || lower.includes('обмін') || lower.includes('міс.')) e = '♻️';
                else if (lower.includes('sweet') || lower.includes('tv') || lower.includes('фільм') || lower.includes('кіно')) e = '🎬';
                else if (lower.includes('монтаж') || lower.includes('демонтаж') || lower.includes('підключення')) e = '🛠️';
                else e = '🔹';
            }
            
            html += `<div class="modal-item">${e ? `<div class="modal-icon-circle">${e}</div>` : ''}<div class="modal-text">${t}</div></div>`;
        });
        
        return html;
    }

    function generateDescToggleHTML(descE, codeF) {
        let descText = "";
        let raw = descE ? descE.toString().trim() : "";
        if (raw && raw !== "Опис відсутній...") { descText = parseDescriptionLines(raw); }
        
        let codeHtml = codeF ? `
            <div class="code-block-wrapper" onclick="window.copyCode(event, this, '${window.escapeForJS(codeF)}')">
                <span class="code-label-text">Код сервісу:</span>
                <span class="code-value-text">${codeF} <span class="color-emoji" style="font-size:16px;">📋</span></span>

        if (!descText && !codeHtml) return '';

        return `

                Детальний опис <span class="arrow" style="display:inline-block; font-size:10px; margin-left:4px;">▼</span>
            </div>
            <div class="desc-content" style="display: none; padding: 16px 20px; background: var(--feat-bg); font-size: 14px; line-height: 1.5; color: var(--text-main);">
                ${codeHtml}
                ${descText}

        `;
    }

    function calculateServicesArray(item, p) {
        const focusList = item.focusServices ? item.focusServices.split('|').map(s => normalizeServiceName(s)) : [];
        const servicesNames = item.service.split('|').map(s => s.trim()).filter(s => s);
        
        const dataForSort = servicesNames.map(name => {
            const brandMatch = name.match(brandRegex);
            const brand = brandMatch ? brandMatch[1] : "";
            let title = brandMatch ? name.replace(brandMatch[0], "").trim() : name;
            
            let nameClean = normalizeServiceName(name);
            let isFocus = false;
            
            if(title.includes('🔥')) {
                isFocus = true; title = title.replace('🔥', '').trim();
            } else if (focusList.includes(nameClean)) {
                isFocus = true;
            }
            
            const matchingTariffs = db.tariffs.filter(x => {
                return normalizeServiceName(x.service) === nameClean || (x.serviceRu && normalizeServiceName(x.serviceRu) === nameClean);
            });
            
            let t = null;
            let isPackage = false;

            if (p > 0) {
                t = matchingTariffs.find(x => p >= x.minPrice && p <= x.maxPrice);
            } 
            if (!t && matchingTariffs.length > 0) {
                t = matchingTariffs.find(x => p >= x.minPrice && p <= x.maxPrice || (p === 0 && x.minPrice === 0));
                if (!t) t = matchingTariffs[0];
            }

            let uName = name.toUpperCase();
            
            let isStaticEpz = (uName.includes('WINDOWS') || uName.includes('OFFICE') || uName.includes('OFFICE 365') || uName.includes('OFFICE 2024') || uName.includes('ESD') || uName.includes('[ESD]')) 
                && !uName.includes('НАЛАШТУВАННЯ') && !uName.includes('ВСТАНОВЛЕННЯ') && !uName.includes('АНТИВІРУС') && !uName.includes('ESET') && !uName.includes('PARALLELS');

            if (!isStaticEpz) {
                if (uName.includes('МОНТАЖ') || uName.includes('ПІДКЛЮЧЕННЯ') || (uName.includes('ВСТАНОВЛЕННЯ') && !uName.includes('WINDOWS') && !uName.includes('ЗАХИСН'))) isPackage = true;
                if (uName.includes('SWEET') || uName.includes('КІНОТЕАТР') || uName.includes('PARALLELS')) isPackage = true; 
                if (uName.includes('АНТИВІРУС') || uName.includes('ESET')) isPackage = true;
                if (uName.includes('ПІКСЕЛ') || uName.includes('ПЕРЕВІРКА')) isPackage = true;
                if (uName.includes('ПОКЛЕЙКА')) isPackage = true;
                if (uName.includes('НАЛАШТУВАННЯ') && !uName.includes('WINDOWS') && !uName.includes('ОФІС') && !uName.includes('OFFICE')) isPackage = true;
                if (uName.includes('ГОДИНА РОБОТИ')) isPackage = true;
                
                if (!isPackage && db.tariffs.some(x => x.cat && normalizeServiceName(x.cat) === nameClean)) {
                    isPackage = true;
                }
            }
            
            let numCost = 0;
            let label = "Дізнатись<br>вартість";
            let serviceCode = t && t.code ? t.code : findInDb(db.serviceCodes, name); 
            
            if (isPackage) {
                label = "Обрати пакет";
            } else if (t && t.cost) {
                let rawCost = t.cost.toString().trim();
                if (rawCost.includes('%')) {
                    if (p > 0) {
                        numCost = Math.round(p * parseFloat(rawCost.replace(',', '.'))/100);
                        label = numCost.toLocaleString('uk-UA') + " ₴";
                    } else label = rawCost; 
                } else {
                    let cleanCost = rawCost.replace(/\s+/g, '').replace(/[^\d.,]/g, '').replace(',', '.');
                    if (cleanCost === '') label = rawCost;
                    else {
                        numCost = parseFloat(cleanCost);
                        label = isNaN(numCost) ? rawCost : numCost.toLocaleString('uk-UA') + " ₴";
                    }
                }
            }
            
            let cls = 'brand-other';
            let descToggleHTML = '';

            return { name, brand, title, numCost, label, cls, isFocus, code: serviceCode, isPackage, descToggleHTML };
        });

        dataForSort.sort((a, b) => {
            if (a.isFocus && !b.isFocus) return -1;
            if (!a.isFocus && b.isFocus) return 1;
            return b.numCost - a.numCost;
        });

        return dataForSort;
    }

    function generateServiceCardHTML(s, isModalCtx = false, disableCompare = false) {
        let isSelected = false;
        let compareModeActive = false;
        
        if (!disableCompare) {

            compareModeActive = isModalCtx ? isModalCompareMode : isCompareMode;
        }
        
        let cardClass = s.cls;
        if (compareModeActive && !s.isPackage) cardClass += ' compare-mode';
        if (isSelected) cardClass += ' selected-for-compare';
        
        let safeName = window.escapeForJS(s.name);
        let safeCode = window.escapeForJS(s.code);
        
        let clickHandler = '';
        if (disableCompare) {
            clickHandler = `onclick="window.handleServiceClick('${safeName}', '${safeCode}', ${s.isPackage}, true)"`;
        } else if (isModalCtx) {
            clickHandler = `onclick="window.handleModalServiceClick(event, '${safeName}', ${s.isPackage}, '${safeCode}')"`;
        } else {

        let descHtml = s.descToggleHTML ? `<div style="width:100%; margin-top:5px; position:relative; z-index:2;">${s.descToggleHTML}</div>` : '';
        let availHtml = s.availabilityHTML ? `<div style="width:100%; margin-top:8px; position:relative; z-index:2;">${s.availabilityHTML}</div>` : '';
        
        let focusHtml = (s.isFocus && !isSelected) ? `<div style="font-size: 22px; margin-left: -2px;"><span class="color-emoji">🔥</span></div>` : '';
        let brandHtml = s.brand ? `<div class="brand-tag">${s.brand}</div>` : `<div style="display: none;"></div>`;

        let wrapperStyle = isModalCtx ? "display:flex; flex-direction:column; align-items:stretch;" : "display:flex; justify-content:space-between; align-items:center;";

        return `
        <div class="service-card ${cardClass}" style="${wrapperStyle}" ${clickHandler}>

            <div style="display:flex; justify-content:space-between; align-items:center; width:100%; position:relative; z-index:2;">

                    </div>
                </div>
                <div class="price-badge">${s.label || s.priceText}</div>
            </div>
            ${availHtml}

        </div>`;
    }

    function extractFeaturesList(desc) {
        let features = [];
        if (!desc) return features;
        
        let lines = desc.replace(/\|/g, '\n').split(/\r?\n/);
        lines.forEach(line => {
            let l = line.trim();
            if (!l || l === "Опис відсутній..." || l.startsWith('+') || l.startsWith('=') || l.includes('---')) return;
            if (!l.startsWith('✕') && !l.startsWith('❌') && !l.toLowerCase().startsWith('не покриває ')) {
                let cleanText = l.replace(/^(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff]|✓|✕|❌|✅|\+|-|\*|•|🔹|⚙️|🛡️|🔑|♻️|🎬|🛠️)\s*/, '').trim();
                if (cleanText) {
                    cleanText = cleanText.charAt(0).toUpperCase() + cleanText.slice(1);
                    features.push(cleanText);
                }
            }
        });
        return features;
    }

    function buildCompareTable(sA, sB, descA, descB) {
        let listA = extractFeaturesList(descA);
        let listB = extractFeaturesList(descB);

        if (listA.length === 0 && listB.length === 0) {
            let html = `<div class="compare-wrapper"><table class="compare-table"><thead><tr>`;
            [sA, sB].forEach(s => {
                let brandLabel = s.brand || (s.cls === 'brand-ekta' ? 'ЕКТА' : (s.cls === 'brand-support' ? 'SUPPORT' : (s.cls === 'brand-epz' ? 'ЕПЗ' : 'СЕРВІС')));
                html += `<th>
                             <div class="brand-tag ${s.cls}" style="margin:0 auto 6px auto; display: inline-block;">${brandLabel}</div>
                             <div style="font-size: 11px; white-space: normal; line-height: 1.2;">${s.title}</div>
                             <div style="font-size: 14px; font-weight: 900; margin-top: 6px;">${s.label || s.priceText}</div>
                          </th>`;
            });
            html += `</tr></thead><tbody><tr>`;
            html += `<td style="white-space:pre-wrap; font-weight: 500;">${descA || 'Опис відсутній'}</td>`;
            html += `<td style="white-space:pre-wrap; font-weight: 500;">${descB || 'Опис відсутній'}</td>`;
            html += `</tr></tbody></table></div>`;
            return html;
        }

        let common = [];
        let diffA = [];
        let diffB = [...listB];

        listA.forEach(featA => {
            let normA = featA.toLowerCase();
            let idxB = diffB.findIndex(featB => featB.toLowerCase() === normA);
            if (idxB !== -1) {
                common.push({a: featA, b: diffB[idxB]});
                diffB.splice(idxB, 1);
            } else {
                diffA.push(featA);
            }
        });

        let html = `<div style="font-size: 11px; color: var(--text-muted); font-weight: 800; margin-bottom: 12px; text-align: center; text-transform: uppercase;">Властивості (унікальні позначені ⭐️)</div>`;
        html += `<div class="compare-wrapper"><table class="compare-table"><thead><tr>`;
        
        [sA, sB].forEach(s => {
            let brandLabel = s.brand || (s.cls === 'brand-ekta' ? 'ЕКТА' : (s.cls === 'brand-support' ? 'SUPPORT' : (s.cls === 'brand-epz' ? 'ЕПЗ' : 'СЕРВІС')));
            html += `<th>
                        <div class="brand-tag ${s.cls}" style="margin:0 auto 6px auto; display: inline-block;">${brandLabel}</div>
                        <div style="font-size: 11px; white-space: normal; line-height: 1.2;">${s.title}</div>
                        <div style="font-size: 15px; font-weight: 900; color: var(--primary); margin-top: 6px;">${s.label || s.priceText}</div>
                     </th>`;
        });
        html += `</tr></thead><tbody>`;

        if (common.length > 0) {
            html += `<tr><td colspan="2" style="background: var(--bg); box-shadow:var(--neu-in); font-weight: 800; font-size: 10px; color: var(--text-muted); text-transform: uppercase; padding: 10px 12px;">Спільні властивості</td></tr>`;
            common.forEach(pair => {
                html += `<tr>
                    <td style="color:var(--text-muted); font-weight: 500;">${pair.a}</td>
                    <td style="color:var(--text-muted); font-weight: 500;">${pair.b}</td>
                </tr>`;
            });
        }

        if (diffA.length > 0 || diffB.length > 0) {
            html += `<tr><td colspan="2" style="background: var(--bg); box-shadow:var(--neu-in); font-weight: 800; font-size: 10px; color: var(--text-muted); text-transform: uppercase; padding: 10px 12px;">Відмінності</td></tr>`;
            let maxDiff = Math.max(diffA.length, diffB.length);
            for (let i = 0; i < maxDiff; i++) {
                let valA = diffA[i] ? `<span class="color-emoji" style="margin-right:6px; font-size: 14px;">⭐️</span>${diffA[i]}` : `<span style="color:var(--text-muted)">-</span>`;
                let valB = diffB[i] ? `<span class="color-emoji" style="margin-right:6px; font-size: 14px;">⭐️</span>${diffB[i]}` : `<span style="color:var(--text-muted)">-</span>`;
                
                html += `<tr>
                    <td style="font-weight:700;">${valA}</td>
                    <td style="font-weight:700;">${valB}</td>
                </tr>`;
            }
        }

        html += `</tbody></table></div>`;
        return html;
    }

            }
            else if (u.includes('КІНОТЕАТР') || u.includes('SWEET') || u.includes('PARALLELS')) { 
                document.getElementById('modalTitle').innerText = u.includes('PARALLELS') ? "Parallels Desktop" : "Онлайн кінотеатри";
                window.renderDirectListModal(u.includes('PARALLELS') ? ["parallels"] : ["sweet", "кінотеатр"]);
                document.getElementById('descModal').classList.add('show');
                return;
            }
            else if (isSetupCategory || u.includes('НАЛАШТУВАННЯ') || u.includes('ПЗ') || u.includes('ПОСЛУГИ') || u.includes('ГОДИНА РОБОТИ')) {
                document.getElementById('modalTitle').innerText = "Налаштування та сервіси";
                window.renderSetupModal(name, "setup");
                document.getElementById('descModal').classList.add('show');
                return;
            }
        }

        let title = name.replace(/🇺🇦\s*/g, '').replace(/^UA\s+/i, '').replace(/^\[.*?\]\s*/, ''); 
        document.getElementById('modalTitle').innerText = title;
        
        const raw = findInDb(db.descriptions, name) || "";
        
        let isValidCode = false;
        if (code) {
            let cStr = code.toString().trim();
            let nStr = name.toString().trim();
            if (cStr !== "" && cStr.toLowerCase() !== nStr.toLowerCase() && /\d/.test(cStr)) {
                isValidCode = true;
            }
        }
        
        let codeBlock = isValidCode ? `
            <div class="code-box" onclick="window.copyCode(event, this, '${window.escapeForJS(code)}')">
                <div>
                    <div style="font-size:11px; font-weight:800; color:var(--text-muted); margin-bottom:4px;">КОД СЕРВІСУ</div>
                    <div class="code-value-text" style="font-size:24px; font-weight:900;">${code}</div>
                </div>
                <div style="font-size:24px;"><span class="color-emoji">📋</span></div>
            </div>` : '';
            
        document.getElementById('modalBody').innerHTML = codeBlock + parseDescriptionLines(raw);
        document.getElementById('descModal').classList.add('show'); 
    }

    // --- МОНТАЖ ТА ІНШІ МОДАЛКИ ---
    window.renderMontazhModal = function() {
        if (!db.montazhData || !db.montazhData.cities || db.montazhData.cities.length === 0) {
            document.getElementById('modalBody').innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted); font-weight: 800;">Помилка: Міста для монтажу не завантажено.</div>`;
            return;
        }

        const cities = db.montazhData.cities.sort((a, b) => a.localeCompare(b));
        const services = db.montazhData.services;

        window.cityStatusMap = new Map();
        cities.forEach(city => {
            let hasAny = services.some(s => {
                let avail = s.availability[city];
                return avail && avail !== "-" && avail !== "✖" && !avail.toLowerCase().includes("немає");
            });
            window.cityStatusMap.set(city, hasAny);
        });

        const categories = [...new Set(services.map(s => s.cat).filter(Boolean))];

        document.getElementById('modalBody').innerHTML = `
            <div style="margin-bottom: 24px;">
                <span style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px; display: block; font-weight: 700; text-align: left; padding-left: 8px;">В якому місті шукаємо?</span>
                <select id="montazhCity" class="input-neu">
                    <option value="">-- Оберіть місто --</option>
                    ${cities.map(c => {
                        let emoji = window.cityStatusMap.get(c) ? "🟢" : "🔴";
                        return `<option value="${c}">${emoji} ${c}</option>`;
                    }).join('')}
                </select>
            </div>
            <div style="margin-bottom: 24px;">
                <span style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px; display: block; font-weight: 700; text-align: left; padding-left: 8px;">Яку техніку потрібно встановити?</span>
                <select id="montazhCat" class="input-neu">
                    <option value="">-- Оберіть категорію --</option>
                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
            <div id="montazhSubCatWrapper" style="display:none; margin-bottom: 24px;">
                <span style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px; display: block; font-weight: 700; text-align: left; padding-left: 8px;">Виберіть підкатегорію:</span>
                <select id="montazhSubCat" class="input-neu"></select>
            </div>
            
            <div class="compare-header">
                <span style="font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Доступні сервіси</span>
                <button id="modalCompareBtn" onclick="window.toggleModalCompareMode()" class="compare-toggle-btn" style="display: none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Порівняти
                </button>
            </div>
            
            <div id="montazhResults" style="display: flex; flex-direction: column; gap: 18px;"></div>
        `;

        let catSelect = document.getElementById('montazhCat');
        if (currentCategoryData && currentCategoryData.category) {
            let targetCat = currentCategoryData.category.toLowerCase();
            for (let i = 0; i < catSelect.options.length; i++) {
                if (catSelect.options[i].value.toLowerCase().includes(targetCat) || targetCat.includes(catSelect.options[i].value.toLowerCase())) {
                    catSelect.selectedIndex = i;
                    setTimeout(() => catSelect.dispatchEvent(new Event('change')), 50);
                    break;
                }
            }
        }

        document.getElementById('montazhCity').addEventListener('change', window.updateMontazhResults);
        document.getElementById('montazhCat').addEventListener('change', (e) => {
            const cat = e.target.value;
            const subCatSelect = document.getElementById('montazhSubCat');
            const subCatWrapper = document.getElementById('montazhSubCatWrapper');
            const subcats = [...new Set(services.filter(s => s.cat === cat).map(s => s.subcat).filter(c => c && c.trim() !== ""))];
            if (subcats.length > 0) {
                subCatSelect.innerHTML = `<option value="">-- Всі послуги --</option>` + subcats.map(sc => `<option value="${sc}">${sc}</option>`).join('');
                subCatWrapper.style.display = 'block';
            } else {
                subCatSelect.innerHTML = '';
                subCatWrapper.style.display = 'none';
            }
            window.updateMontazhResults();
        });
        document.getElementById('montazhSubCat').addEventListener('change', window.updateMontazhResults);
    }

    window.updateMontazhResults = function() {
        const city = document.getElementById('montazhCity').value;
        const cat = document.getElementById('montazhCat').value;
        const subcatWrapper = document.getElementById('montazhSubCatWrapper');
        const subcat = subcatWrapper.style.display !== 'none' ? document.getElementById('montazhSubCat').value : "";
        const resultsContainer = document.getElementById('montazhResults');
        
        if (!city || !cat) { resultsContainer.innerHTML = ""; return; }

        const matches = db.montazhData.services.filter(s => s.cat === cat && (!subcatWrapper.style.display || subcatWrapper.style.display === 'none' || !subcat || s.subcat === subcat));

        if (matches.length === 0) { resultsContainer.innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted);">Послуг не знайдено</div>`; return; }

        let renderItems = [];

        matches.forEach(s => {
             let availability = s.availability[city] || "";
             let isUnavailable = (!availability || availability.toLowerCase().includes("немає") || availability === "-" || availability === "✖");

             let displayProv = ""; let matchProv = s.name.match(/^\[(.*?)\]/);
             if (matchProv) displayProv = matchProv[1].trim(); 

             let price = s.price;
             if (!price) {
                 let nameClean = normalizeServiceName(s.name);
                 const t = db.tariffs.find(x => normalizeServiceName(x.service) === nameClean || (x.serviceRu && normalizeServiceName(x.serviceRu) === nameClean));
                 if (t && t.cost) price = t.cost;
             }
             
             let cleanCost = price.toString().replace(/\s+/g, '').replace(/[^\d.,]/g, '').replace(',', '.');
             let priceVal = parseFloat(cleanCost) || 0;
             let priceText = isNaN(priceVal) || cleanCost === '' ? price : priceVal.toLocaleString('uk-UA') + " ₴";
             
             let descToggleHTML = generateDescToggleHTML(findInDb(db.descriptions, s.name), findInDb(db.serviceCodes, s.name));
             
             renderItems.push({
                 isUnavailable: isUnavailable, priceVal: priceVal, displayProv: displayProv,
                 serviceName: s.name, priceText: priceText, descToggleHTML: descToggleHTML, availability: availability, code: s.code
             });
        });

        renderItems.sort((a, b) => { if (a.isUnavailable !== b.isUnavailable) return a.isUnavailable ? 1 : -1; return b.priceVal - a.priceVal; });

        window.lastModalServices = renderItems.map(item => {
            let cls = 'brand-other';
            let pUpper = item.displayProv.toUpperCase();
            if (pUpper === 'ЕКТА' || pUpper === 'EKTA') cls = "brand-ekta"; 
            else if (pUpper === 'НАШ СЕРВІС' || pUpper === 'SUPPORT' || pUpper === 'МІЙ СЕРВІС') cls = "brand-support";
            
            return { 
                name: item.serviceName, title: item.serviceName.replace(/^\[.*?\]\s*/, ''), brand: item.displayProv, 
                cls: cls, priceText: item.priceText, code: item.code 
            };
        });

        let modalCompBtn = document.getElementById('modalCompareBtn');
        let availableCount = renderItems.filter(item => !item.isUnavailable).length;
        if (modalCompBtn) {
            if (availableCount >= 2) {
                modalCompBtn.style.display = 'flex';
            } else {
                modalCompBtn.style.display = 'none';
                if (isModalCompareMode) window.toggleModalCompareMode();
            }
        }

        let resultsHTML = ""; let seenUnavailable = new Set(); 

        renderItems.forEach(item => {
            let cls = 'brand-other';
            let pUpper = item.displayProv.toUpperCase();
            if (pUpper === 'ЕКТА' || pUpper === 'EKTA') cls = "brand-ekta"; 
            else if (pUpper === 'НАШ СЕРВІС' || pUpper === 'SUPPORT' || pUpper === 'МІЙ СЕРВІС') cls = "brand-support";
            
            let obj = { name: item.serviceName, title: item.serviceName.replace(/^\[.*?\]\s*/, ''), brand: item.displayProv, cls: cls, label: item.priceText, descToggleHTML: item.descToggleHTML, isPackage: false, code: item.code };
            
            if (item.isUnavailable) {
                if (!seenUnavailable.has(pUpper) && item.displayProv) {
                    seenUnavailable.add(pUpper);
                    resultsHTML += `
                    <div style="position: relative; padding: 22px; border-radius: 24px; cursor: default; background: var(--bg); display: block; box-shadow: var(--neu-in); margin-bottom: 18px; border: 1px solid var(--border);">
                        <div style="font-size: 13px; font-weight: 600; color: #ef4444; margin-top: 5px;">На жаль, в цьому місті неможливий монтаж підрядником ${item.displayProv}</div>
                    </div>`; 
                }
            } else {
                 let text = item.availability; let availLower = text.toLowerCase(); let displayText = text;
                 if (availLower === "так" || availLower === "+") displayText = "В межах міста";
                 
                 let extraInfoHTML = "";
                 if (text && availLower !== "так" && availLower !== "+") {
                     extraInfoHTML = `<div style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-top: 10px; line-height: 1; background: var(--bg); box-shadow: var(--neu-pressed); color: var(--primary);"><span class="color-emoji" style="font-size: 16px;">📍</span> ${displayText}</div>`;
                 }
                 obj.availabilityHTML = extraInfoHTML; 
                 resultsHTML += generateServiceCardHTML(obj, true); 
            }
        });

        resultsContainer.innerHTML = resultsHTML;
    }

    window.renderDirectListModal = function(targetCategories) {
        if (!Array.isArray(targetCategories)) targetCategories = [targetCategories];
        let matches = db.tariffs.filter(t => {
            let c = t.cat ? normalizeServiceName(t.cat) : ""; let sName = t.service ? normalizeServiceName(t.service) : "";
            return targetCategories.some(tc => { let ntc = normalizeServiceName(tc); return c.includes(ntc) || sName.includes(ntc); });
        });
        
        if(matches.length === 0) {
             document.getElementById('modalBody').innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted);">Послуг не знайдено</div>`;
             return;
        }
        
        const p = parseFloat(elPriceInput.value) || 0; 
        let processedMatches = matches.map(m => {
            let numCost = 0; let priceText = "Дізнатись вартість";
            if (m.cost) {
                let rawCost = m.cost.toString().trim();
                if (rawCost.includes('%')) { if (p > 0) { numCost = Math.round(p * parseFloat(rawCost.replace(',', '.'))/100); priceText = numCost.toLocaleString('uk-UA') + " ₴"; } else priceText = rawCost; } 
                else {
                    let cleanCost = rawCost.replace(/\s+/g, '').replace(/[^\d.,]/g, '').replace(',', '.');
                    if (cleanCost === '') priceText = rawCost;
                    else { numCost = parseFloat(cleanCost); priceText = isNaN(numCost) ? rawCost : numCost.toLocaleString('uk-UA') + " ₴"; }
                }
            }
            let cls = 'brand-settings';
            let uName = m.service.toUpperCase();
            if (uName.includes('SUPPORT') || uName.includes('НАШ СЕРВІС')) cls = 'brand-support'; 
            else if (uName.includes('EKTA') || uName.includes('ЕКТА')) cls = 'brand-ekta'; 
            else if (uName.includes('EPZ') || uName.includes('ЕПЗ')) cls = 'brand-epz'; 

            return { name: m.service, title: m.service.replace(/^\[.*?\]\s*/, ''), numCost, priceText, cls: cls, code: m.code, isPackage: false };
        });

        processedMatches.sort((a, b) => b.numCost - a.numCost);
        window.lastModalServices = processedMatches;
        
        let headerHtml = `
        <div class="compare-header">
            <span style="font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Доступні послуги</span>
            <button id="modalCompareBtn" onclick="window.toggleModalCompareMode()" class="compare-toggle-btn" style="display: ${processedMatches.length >= 2 ? 'flex' : 'none'};">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Порівняти
            </button>
        </div>`;

        let html = processedMatches.map(m => { m.label = m.priceText; m.descToggleHTML = generateDescToggleHTML(findInDb(db.descriptions, m.name), m.code); return generateServiceCardHTML(m, true); }).join('');
        document.getElementById('modalBody').innerHTML = headerHtml + `<div id="setupResults" class="service-list" style="margin-top: 5px;">${html}</div>`;
    }

    window.renderSetupModal = function(targetName, mode = "setup") {
        let setupCats = [...new Set(db.tariffs.filter(t => {
            if (!t.cat) return false; let c = t.cat.toLowerCase();
            if (mode === "antivirus") return c.includes('антивірус') || c.includes('eset');
            else return !c.includes('монтаж') && !c.includes('кухонна') && !c.includes('перевірка') && !c.includes('поклейка') && !c.includes('скло') && !c.includes('антивірус') && !c.includes('eset') && !c.includes('кінотеатр') && !c.includes('sweet') && !c.includes('сервіси support') && !c.includes('сервіси екта');
        }).map(t => t.cat))];
        
        let labelText = mode === "antivirus" ? "Оберіть тип антивірусу:" : "Оберіть тип сервісу:";

        document.getElementById('modalBody').innerHTML = `
            <div style="margin-bottom: 20px;">
                <span style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px; display: block; font-weight: 700; text-align: left; padding-left: 8px;">${labelText}</span>
                <select id="setupCat" class="input-neu">
                    <option value="">-- Оберіть категорію --</option>
                    ${setupCats.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
            
            <div class="compare-header">
                <span style="font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Доступні послуги</span>
                <button id="modalCompareBtn" onclick="window.toggleModalCompareMode()" class="compare-toggle-btn" style="display: none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Порівняти
                </button>
            </div>
            
            <div id="setupResults" style="display: flex; flex-direction: column; gap: 18px;"></div>
        `;
        
        let catSelect = document.getElementById('setupCat');
        let targetClean = normalizeServiceName(targetName);
        let targetTariff = db.tariffs.find(t => normalizeServiceName(t.service) === targetClean || (t.serviceRu && normalizeServiceName(t.serviceRu) === targetClean));
        let catToSelect = targetTariff && targetTariff.cat ? targetTariff.cat : targetName;

        let cleanCatToSelect = normalizeServiceName(catToSelect);
        for (let i = 0; i < catSelect.options.length; i++) {
            let optClean = normalizeServiceName(catSelect.options[i].value);
            if (optClean === cleanCatToSelect || optClean.includes(cleanCatToSelect) || cleanCatToSelect.includes(optClean)) {
                catSelect.selectedIndex = i; setTimeout(() => catSelect.dispatchEvent(new Event('change')), 50); break;
            }
        }
        catSelect.addEventListener('change', window.updateSetupResults);
    }
    
    window.updateSetupResults = function() {
        let catInput = document.getElementById('setupCat');
        let container = document.getElementById('setupResults');
        if(!container || !catInput) return;
        
        let cat = catInput.value;
        if(!cat) { container.innerHTML = ""; return; }
        
        let matches = db.tariffs.filter(t => t.cat === cat);
        if(matches.length === 0) { container.innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted);">Послуг не знайдено</div>`; return; }
        
        const p = parseFloat(elPriceInput.value) || 0; 
        let processedMatches = matches.map(m => {
            let numCost = 0; let priceText = "Дізнатись вартість";
            if (m.cost) {
                let rawCost = m.cost.toString().trim();
                if (rawCost.includes('%')) { if (p > 0) { numCost = Math.round(p * parseFloat(rawCost.replace(',', '.'))/100); priceText = numCost.toLocaleString('uk-UA') + " ₴"; } else priceText = rawCost; } 
                else {
                    let cleanCost = rawCost.replace(/\s+/g, '').replace(/[^\d.,]/g, '').replace(',', '.');
                    if (cleanCost === '') priceText = rawCost;
                    else { numCost = parseFloat(cleanCost); priceText = isNaN(numCost) ? rawCost : numCost.toLocaleString('uk-UA') + " ₴"; }
                }
            }
            let cls = 'brand-settings';
            let uName = m.service.toUpperCase();
            if (uName.includes('SUPPORT') || uName.includes('НАШ СЕРВІС')) cls = 'brand-support'; 
            else if (uName.includes('EKTA') || uName.includes('ЕКТА')) cls = 'brand-ekta'; 
            else if (uName.includes('EPZ') || uName.includes('ЕПЗ')) cls = 'brand-epz'; 

            return { name: m.service, title: m.service.replace(/^\[.*?\]\s*/, ''), numCost, priceText, cls: cls, code: m.code, isPackage: false };
        });

        processedMatches.sort((a, b) => b.numCost - a.numCost);
        window.lastModalServices = processedMatches;

        let modalCompBtn = document.getElementById('modalCompareBtn');
        if (modalCompBtn) {
            if (processedMatches.length >= 2) {
                modalCompBtn.style.display = 'flex';
            } else {
                modalCompBtn.style.display = 'none';
                if (isModalCompareMode) window.toggleModalCompareMode();
            }
        }
        
        container.innerHTML = processedMatches.map(m => { 
            m.label = m.priceText; 
            m.descToggleHTML = generateDescToggleHTML(findInDb(db.descriptions, m.name), m.code);
            return generateServiceCardHTML(m, true); 
        }).join('');
    }

    window.closeModal = function() { 
        document.getElementById('descModal').classList.remove('show');
        toggleBodyScroll(false);
    }

    init();
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(console.error); }); }
</script>
